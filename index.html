<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 射擊靶場</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#060b1a; color:#fff; font-family:Arial,sans-serif; }
    #hud { position:fixed; top:12px; left:12px; z-index:10; background:rgba(8,10,24,.55); padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.12); }
    #hint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:10; background:rgba(8,10,24,.55); padding:8px 12px; border-radius:10px; font-size:14px; border:1px solid rgba(255,255,255,.12); }
    #reticle { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:16px; height:16px; z-index:10; pointer-events:none; }
    #reticle::before,#reticle::after{ content:''; position:absolute; background:#fff; box-shadow:0 0 8px rgba(255,255,255,.8); }
    #reticle::before{ left:7px; top:0; width:2px; height:16px; }
    #reticle::after{ top:7px; left:0; height:2px; width:16px; }
    #start { position:fixed; inset:0; display:grid; place-items:center; background:rgba(0,0,0,.6); z-index:20; }
    button{ padding:10px 16px; border:0; border-radius:10px; cursor:pointer; font-weight:bold; background:#2563eb; color:white; }
  </style>
</head>
<body>
  <div id="hud">分數: <span id="score">0</span> ｜ 時間: <span id="time">60</span>s</div>
  <div id="reticle"></div>
  <div id="hint">WASD 移動（已修正方向）、Space 跳躍、滑鼠看向、左鍵射擊</div>
  <div id="start"><button id="startBtn">開始 3D 射擊靶場</button></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1330);
    scene.fog = new THREE.Fog(0x0b1330, 25, 90);

    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 1.7, 8);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Lighting (more colorful)
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));
    const hemi = new THREE.HemisphereLight(0x7dd3fc, 0x312e81, 1.1);
    scene.add(hemi);
    const key = new THREE.DirectionalLight(0xffffff, 0.7);
    key.position.set(5, 12, 4);
    scene.add(key);
    const neon1 = new THREE.PointLight(0x22d3ee, 1.1, 45, 2);
    neon1.position.set(-12, 6, -8);
    scene.add(neon1);
    const neon2 = new THREE.PointLight(0xf472b6, 1.0, 45, 2);
    neon2.position.set(12, 5, 8);
    scene.add(neon2);

    // floor
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(220, 220),
      new THREE.MeshStandardMaterial({ color:0x1f2937, roughness:0.9, metalness:0.05 })
    );
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    // colorful tiles for richer visuals
    const tileGeo = new THREE.BoxGeometry(2, 0.02, 2);
    for(let i=0;i<120;i++){
      const c = new THREE.Color().setHSL(Math.random(), 0.55, 0.45);
      const t = new THREE.Mesh(tileGeo, new THREE.MeshStandardMaterial({ color:c, emissive:c.clone().multiplyScalar(0.08) }));
      t.position.set((Math.random()-0.5)*70, 0.01, (Math.random()-0.5)*70);
      scene.add(t);
    }

    const walls = new THREE.Group();
    const wallMat = new THREE.MeshStandardMaterial({ color:0x0f172a });
    const mkWall = (x,z,w,d)=>{
      const m = new THREE.Mesh(new THREE.BoxGeometry(w,4,d), wallMat);
      m.position.set(x,2,z); walls.add(m);
    };
    mkWall(0,-30,60,1); mkWall(0,30,60,1); mkWall(-30,0,1,60); mkWall(30,0,1,60);
    scene.add(walls);

    // targets
    const targets = [];
    function spawnTarget(){
      const r = 0.55 + Math.random()*0.55;
      const hue = Math.random();
      const color = new THREE.Color().setHSL(hue, 0.8, 0.55);
      const mat = new THREE.MeshStandardMaterial({ color, emissive: color.clone().multiplyScalar(0.35), roughness:0.35, metalness:0.2 });
      const t = new THREE.Mesh(new THREE.SphereGeometry(r, 24, 24), mat);
      t.position.set((Math.random()-0.5)*40, 1.2 + Math.random()*4, (Math.random()-0.5)*40);
      t.userData.vel = new THREE.Vector3((Math.random()-0.5)*1.8, (Math.random()-0.5)*0.6, (Math.random()-0.5)*1.8);
      scene.add(t);
      targets.push(t);
    }
    for(let i=0;i<16;i++) spawnTarget();

    // gun model (first-person hand + gun)
    const weapon = new THREE.Group();
    const handMat = new THREE.MeshStandardMaterial({ color:0xffd7b5, roughness:0.8 });
    const gunMat = new THREE.MeshStandardMaterial({ color:0x9ca3af, metalness:0.6, roughness:0.35 });
    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.14,0.35), handMat);
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.16,0.52), gunMat);
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.45,16), gunMat);
    barrel.rotation.x = Math.PI/2;
    hand.position.set(0.12, -0.10, -0.08);
    body.position.set(0.0, 0.0, -0.24);
    barrel.position.set(0.0, 0.02, -0.54);
    weapon.add(hand, body, barrel);
    weapon.position.set(0.38, -0.34, -0.72); // bottom-right view
    camera.add(weapon);
    scene.add(camera);

    // gameplay state
    const bullets = [];
    const impacts = [];
    const bulletGeo = new THREE.SphereGeometry(0.09, 10, 10);
    const bulletMat = new THREE.MeshBasicMaterial({ color:0xfff59d });

    let score = 0;
    let timeLeft = 60;
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');

    const keys = {};
    addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      keys[k] = true;
      if ((k === ' ' || e.code === 'Space') && running && camera.position.y <= playerHeight + 0.001) {
        yVel = jumpSpeed;
      }
    });
    addEventListener('keyup', e => {
      const k = e.key.toLowerCase();
      keys[k] = false;
    });

    let yaw = 0, pitch = 0;
    let running = false;
    let recoil = 0;
    let yVel = 0;
    const playerHeight = 1.7;
    const gravity = 24;
    const jumpSpeed = 8.2;

    function resetGame(){
      score = 0;
      timeLeft = 60;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      camera.position.set(0,playerHeight,8);
      yaw = 0; pitch = 0;
      yVel = 0;
      for(const t of targets){
        t.position.set((Math.random()-0.5)*40, 1.2 + Math.random()*4, (Math.random()-0.5)*40);
      }
      for(const b of bullets) scene.remove(b.mesh);
      bullets.length = 0;
      for(const i of impacts) scene.remove(i.mesh);
      impacts.length = 0;
    }

    function spawnImpact(p){
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8), new THREE.MeshBasicMaterial({color:0xffe082}));
      mesh.position.copy(p);
      scene.add(mesh);
      impacts.push({mesh, life:0.2});
    }

    function shoot(){
      if(!running) return;
      const d = new THREE.Vector3();
      camera.getWorldDirection(d);
      const mesh = new THREE.Mesh(bulletGeo, bulletMat);
      mesh.position.copy(camera.position).addScaledVector(d, 0.65);
      scene.add(mesh);
      bullets.push({ mesh, vel: d.multiplyScalar(58), life: 1.35 });
      recoil = 0.06;
    }
    addEventListener('mousedown', shoot);

    addEventListener('mousemove', (e)=>{
      if(document.pointerLockElement !== renderer.domElement) return;
      yaw -= e.movementX * 0.0022;
      pitch -= e.movementY * 0.0018;
      pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
    });

    const startLayer = document.getElementById('start');
    function bindStart(){
      const btn = document.getElementById('startBtn');
      btn.onclick = ()=>{
        renderer.domElement.requestPointerLock();
        startLayer.style.display = 'none';
        running = true;
        resetGame();
      };
    }
    bindStart();

    setInterval(()=>{
      if(!running) return;
      timeLeft -= 1;
      timeEl.textContent = timeLeft;
      if(timeLeft <= 0){
        running = false;
        startLayer.style.display = 'grid';
        startLayer.innerHTML = `<button id="startBtn">再玩一次（分數 ${score}）</button>`;
        bindStart();
      }
    }, 1000);

    const clock = new THREE.Clock();
    const move = new THREE.Vector3();
    const front = new THREE.Vector3();
    const right = new THREE.Vector3();

    function animate(){
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, clock.getDelta());

      if(running){
        // FIXED: forward direction reversed issue corrected
        front.set(-Math.sin(yaw), 0, -Math.cos(yaw)).normalize();
        right.set(front.z, 0, -front.x).normalize();

        move.set(0,0,0);
        if(keys['w']) move.add(front);
        if(keys['s']) move.addScaledVector(front, -1);
        if(keys['a']) move.add(right);
        if(keys['d']) move.addScaledVector(right, -1);
        if(move.lengthSq() > 0) move.normalize();

        const speed = 8.8;
        camera.position.addScaledVector(move, speed * dt);

        // jump physics
        yVel -= gravity * dt;
        camera.position.y += yVel * dt;
        if (camera.position.y < playerHeight) {
          camera.position.y = playerHeight;
          yVel = 0;
        }

        camera.position.x = Math.max(-28, Math.min(28, camera.position.x));
        camera.position.z = Math.max(-28, Math.min(28, camera.position.z));

        camera.rotation.order = 'YXZ';
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;

        // weapon bob + recoil
        const bob = Math.sin(performance.now() * 0.012) * (move.lengthSq() > 0 ? 0.01 : 0.003);
        recoil = Math.max(0, recoil - dt * 0.18);
        weapon.position.set(0.38, -0.34 - bob + recoil, -0.72 + recoil * 0.8);

        for(const t of targets){
          t.position.addScaledVector(t.userData.vel, dt);
          if(Math.abs(t.position.x) > 27) t.userData.vel.x *= -1;
          if(t.position.y < 1 || t.position.y > 7) t.userData.vel.y *= -1;
          if(Math.abs(t.position.z) > 27) t.userData.vel.z *= -1;
        }

        for(let i = bullets.length - 1; i >= 0; i--){
          const b = bullets[i];
          b.mesh.position.addScaledVector(b.vel, dt);
          b.life -= dt;

          let hit = false;
          for(const t of targets){
            const rr = (t.geometry.parameters.radius || 0.8) + 0.12;
            if(b.mesh.position.distanceToSquared(t.position) <= rr*rr){
              score += 10;
              scoreEl.textContent = score;
              spawnImpact(b.mesh.position);
              t.position.set((Math.random()-0.5)*40, 1.2 + Math.random()*4, (Math.random()-0.5)*40);
              hit = true;
              break;
            }
          }

          if(hit || b.life <= 0 || Math.abs(b.mesh.position.x) > 42 || Math.abs(b.mesh.position.y) > 22 || Math.abs(b.mesh.position.z) > 42){
            if(!hit) spawnImpact(b.mesh.position);
            scene.remove(b.mesh);
            bullets.splice(i,1);
          }
        }

        for(let i = impacts.length - 1; i >= 0; i--){
          const p = impacts[i];
          p.life -= dt;
          p.mesh.scale.multiplyScalar(0.96);
          if(p.life <= 0){ scene.remove(p.mesh); impacts.splice(i,1); }
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
