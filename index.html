<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 射擊靶場</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#0b1020; color:#fff; font-family:Arial,sans-serif; }
    #hud { position:fixed; top:12px; left:12px; z-index:10; background:rgba(0,0,0,.45); padding:10px 12px; border-radius:10px; }
    #hint { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:10; background:rgba(0,0,0,.45); padding:8px 12px; border-radius:10px; font-size:14px; }
    #reticle { position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:16px; height:16px; z-index:10; pointer-events:none; }
    #reticle::before,#reticle::after{ content:''; position:absolute; background:#fff; }
    #reticle::before{ left:7px; top:0; width:2px; height:16px; }
    #reticle::after{ top:7px; left:0; height:2px; width:16px; }
    #start { position:fixed; inset:0; display:grid; place-items:center; background:rgba(0,0,0,.6); z-index:20; }
    button{ padding:10px 16px; border:0; border-radius:10px; cursor:pointer; font-weight:bold; }
  </style>
</head>
<body>
  <div id="hud">分數: <span id="score">0</span> ｜ 時間: <span id="time">60</span>s</div>
  <div id="reticle"></div>
  <div id="hint">WASD 移動、滑鼠看向、左鍵射擊</div>
  <div id="start"><button id="startBtn">開始 3D 射擊靶場</button></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 1.7, 8);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x334455, 1.0);
    scene.add(hemi);
    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
    dir.position.set(3, 10, 4);
    scene.add(dir);

    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({ color:0x1f2937 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    const walls = new THREE.Group();
    const wallMat = new THREE.MeshStandardMaterial({ color:0x0f172a });
    const mkWall = (x,z,w,d)=>{
      const m = new THREE.Mesh(new THREE.BoxGeometry(w,4,d), wallMat);
      m.position.set(x,2,z); walls.add(m);
    };
    mkWall(0,-30,60,1); mkWall(0,30,60,1); mkWall(-30,0,1,60); mkWall(30,0,1,60);
    scene.add(walls);

    const targetMat = new THREE.MeshStandardMaterial({ color:0xff4d4d, emissive:0x220000 });
    const targets = [];
    function spawnTarget(){
      const r = 0.6 + Math.random()*0.5;
      const t = new THREE.Mesh(new THREE.SphereGeometry(r, 24, 24), targetMat.clone());
      t.position.set((Math.random()-0.5)*40, 1.2 + Math.random()*4, (Math.random()-0.5)*40);
      t.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.03, (Math.random()-0.5)*0.01, (Math.random()-0.5)*0.03);
      scene.add(t); targets.push(t);
    }
    for(let i=0;i<14;i++) spawnTarget();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(0,0);

    let score = 0;
    let timeLeft = 60;
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');

    const keys = {};
    addEventListener('keydown', e=> keys[e.key.toLowerCase()] = true);
    addEventListener('keyup', e=> keys[e.key.toLowerCase()] = false);

    let yaw = 0, pitch = 0;
    let running = false;

    function shoot(){
      if(!running) return;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(targets, false);
      if(hits.length){
        const t = hits[0].object;
        score += 10;
        scoreEl.textContent = score;
        t.position.set((Math.random()-0.5)*40, 1.2 + Math.random()*4, (Math.random()-0.5)*40);
      }
    }
    addEventListener('mousedown', shoot);

    addEventListener('mousemove', (e)=>{
      if(document.pointerLockElement !== renderer.domElement) return;
      yaw -= e.movementX * 0.002;
      pitch -= e.movementY * 0.002;
      pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    });

    const startLayer = document.getElementById('start');
    document.getElementById('startBtn').onclick = ()=>{
      renderer.domElement.requestPointerLock();
      startLayer.style.display = 'none';
      running = true;
      score = 0; timeLeft = 60;
      scoreEl.textContent = score; timeEl.textContent = timeLeft;
    };

    setInterval(()=>{
      if(!running) return;
      timeLeft -= 1;
      timeEl.textContent = timeLeft;
      if(timeLeft <= 0){
        running = false;
        startLayer.style.display = 'grid';
        startLayer.innerHTML = `<button id="startBtn">再玩一次（分數 ${score}）</button>`;
        document.getElementById('startBtn').onclick = ()=>{
          renderer.domElement.requestPointerLock();
          startLayer.style.display = 'none';
          running = true;
          score = 0; timeLeft = 60;
          scoreEl.textContent = score; timeEl.textContent = timeLeft;
        };
      }
    }, 1000);

    function animate(){
      requestAnimationFrame(animate);

      if(running){
        const forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
        const right = new THREE.Vector3(forward.z,0,-forward.x);
        const speed = 0.12;
        if(keys['w']) camera.position.addScaledVector(forward, -speed);
        if(keys['s']) camera.position.addScaledVector(forward, speed);
        if(keys['a']) camera.position.addScaledVector(right, -speed);
        if(keys['d']) camera.position.addScaledVector(right, speed);

        camera.position.x = Math.max(-28, Math.min(28, camera.position.x));
        camera.position.z = Math.max(-28, Math.min(28, camera.position.z));

        camera.rotation.order = 'YXZ';
        camera.rotation.y = yaw;
        camera.rotation.x = pitch;

        for(const t of targets){
          t.position.add(t.userData.vel);
          if(Math.abs(t.position.x)>27) t.userData.vel.x *= -1;
          if(t.position.y<1 || t.position.y>7) t.userData.vel.y *= -1;
          if(Math.abs(t.position.z)>27) t.userData.vel.z *= -1;
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    addEventListener('resize', ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
