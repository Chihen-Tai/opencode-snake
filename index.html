<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#0b1020; font-family:Arial, sans-serif; color:#e6edf3; }
    .wrap { width:min(92vw,680px); }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .btn { background:#1f6feb; border:none; color:white; padding:8px 12px; border-radius:8px; cursor:pointer; }
    canvas { width:100%; aspect-ratio:3/2; background:#111827; border:1px solid #30363d; border-radius:12px; }
    .hint { opacity:.8; font-size:13px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h2>🐍 Snake</h2>
      <div>
        <span id="score">Score: 0</span>
        <button class="btn" id="restart">重開</button>
      </div>
    </div>
    <canvas id="game" width="600" height="400"></canvas>
    <div class="hint">操作：方向鍵 / WASD，撞牆或撞到自己會結束。</div>
  </div>

  <script>
    const cvs = document.getElementById('game');
    const ctx = cvs.getContext('2d');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart');

    const GRID = 20, W = cvs.width, H = cvs.height;
    let snake, dir, nextDir, food, score, timer;

    const randCell = n => Math.floor(Math.random()*n)*GRID;
    const spawnFood = () => {
      while (true) {
        const f = {x: randCell(W/GRID), y: randCell(H/GRID)};
        if (!snake.some(s => s.x===f.x && s.y===f.y)) return f;
      }
    };

    function reset(){
      snake = [{x:100,y:100},{x:80,y:100},{x:60,y:100}];
      dir='R'; nextDir='R'; score=0; food=spawnFood();
      scoreEl.textContent = `Score: ${score}`;
      clearInterval(timer);
      timer = setInterval(tick, 120);
      draw();
    }

    function setDir(d){
      const opp = {U:'D',D:'U',L:'R',R:'L'};
      if (d !== opp[dir]) nextDir = d;
    }

    function tick(){
      dir = nextDir;
      const h = {...snake[0]};
      if (dir==='U') h.y -= GRID;
      if (dir==='D') h.y += GRID;
      if (dir==='L') h.x -= GRID;
      if (dir==='R') h.x += GRID;

      if (h.x<0 || h.x>=W || h.y<0 || h.y>=H || snake.some(s=>s.x===h.x&&s.y===h.y)){
        clearInterval(timer);
        draw(true);
        return;
      }

      snake.unshift(h);
      if (h.x===food.x && h.y===food.y){
        score++; scoreEl.textContent = `Score: ${score}`; food=spawnFood();
      } else snake.pop();

      draw();
    }

    function draw(gameOver=false){
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x+10, food.y+10, 8, 0, Math.PI*2); ctx.fill();

      snake.forEach((s,i)=>{
        ctx.fillStyle = i===0 ? '#22c55e' : '#16a34a';
        ctx.fillRect(s.x+1, s.y+1, GRID-2, GRID-2);
      });

      if (gameOver){
        ctx.fillStyle='rgba(0,0,0,.55)';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#fff';
        ctx.font='bold 32px Arial';
        ctx.textAlign='center';
        ctx.fillText('Game Over', W/2, H/2 - 10);
        ctx.font='16px Arial';
        ctx.fillText('按「重開」再玩一次', W/2, H/2 + 20);
      }
    }

    window.addEventListener('keydown', e=>{
      const k=e.key.toLowerCase();
      if (k==='arrowup'||k==='w') setDir('U');
      if (k==='arrowdown'||k==='s') setDir('D');
      if (k==='arrowleft'||k==='a') setDir('L');
      if (k==='arrowright'||k==='d') setDir('R');
    });
    restartBtn.onclick = reset;
    reset();
  </script>
</body>
</html>
